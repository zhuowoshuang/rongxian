version: "3.8"

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis（可选）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # FastAPI 后端
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stock_agent
      REDIS_URL: redis://redis:6379/0
      MOCK_DATA: "true"
      JWT_SECRET_KEY: stock-agent-docker-secret-key
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m app.seed --force && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
